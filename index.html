<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiche produit QR</title>

  <!-- LIB QR -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .card {
      max-width: 520px;
      margin: 40px auto;
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
      color: #1f2937;
    }

    .line {
      margin: 14px 0;
      font-size: 16px;
    }

    .label {
      font-weight: bold;
      color: #374151;
    }

    .value {
      color: #111827;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
    }

    .button {
      display: block;
      margin-top: 10px;
      padding: 14px;
      background: #2563eb;
      color: white;
      text-align: center;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    #reader {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Infos produits</h1>

    <!-- 🔹 Champ manuel -->
    <input type="text" id="serialInput" placeholder="Entrer un numéro de série" />

    <button class="button" onclick="searchSerial()">Rechercher</button>

    <!-- 🔥 NOUVEAU BOUTON SCAN -->
    <button class="button" onclick="startScanner()">Scanner QR Code</button>

    <!-- Zone caméra -->
    <div id="reader"></div>

    <div id="content">En attente de recherche...</div>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyzCSVOFQTr8Bs_xwRhV4495Y43zo8lBfd6GG9Bj4sJsQy8s3Qhhl9H7knku0amW6o5/exec";
    const content = document.getElementById("content");

    let scanner;

    // 🔹 Si QR dans URL
    const params = new URLSearchParams(window.location.search);
    const serialFromURL = params.get("sn");

    if (serialFromURL) {
      document.getElementById("serialInput").value = serialFromURL;
      fetchData(serialFromURL);
    }

    function searchSerial() {
      const serial = document.getElementById("serialInput").value.trim();

      if (!serial) {
        content.innerHTML = '<p class="error">Veuillez entrer un numéro de série.</p>';
        return;
      }

      fetchData(serial);
    }

    // 🔥 SCAN QR
    function startScanner() {
      const readerDiv = document.getElementById("reader");

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: 250
        },
        (decodedText) => {
          // QR détecté
          document.getElementById("serialInput").value = decodedText;

          scanner.stop();

          fetchData(decodedText);
        },
        (error) => {
          // ignore erreurs scan
        }
      ).catch(err => {
        console.error(err);
        content.innerHTML = '<p class="error">Impossible d’accéder à la caméra.</p>';
      });
    }

    function fetchData(serial) {
      content.innerHTML = "Chargement...";

      fetch(`${API_URL}?sn=${encodeURIComponent(serial)}`)
        .then(response => response.json())
        .then(data => {
          if (data.error) {
            content.innerHTML = `
              <p class="error">Produit introuvable.</p>
              <p>Numéro recherché : ${serial}</p>
            `;
            return;
          }

          content.innerHTML = `
            <div class="line"><span class="label">Numéro de série :</span> ${data.serial}</div>
            <div class="line"><span class="label">Produit :</span> ${data.produit}</div>
            <div class="line"><span class="label">Statut :</span> ${data.statut}</div>
            <div class="line"><span class="label">Client :</span> ${data.client}</div>
            <div class="line"><span class="label">Date fabrication :</span> ${formatDate(data.date_fab)}</div>
            <div class="line"><span class="label">Commentaire :</span> ${data.commentaire}</div>
          `;
        })
        .catch(() => {
          content.innerHTML = '<p class="error">Erreur de chargement.</p>';
        });
    }

    function formatDate(value) {
      if (!value) return "";
      const date = new Date(value);
      if (isNaN(date)) return value;
      return date.toLocaleDateString("fr-FR");
    }
  </script>
</body>
</html>
